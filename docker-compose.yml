services:
  sqlserver:
    build:
      context: .
      dockerfile: sqlserver/Dockerfile
    ports:
      - "1435:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Grupo1@BDD!}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql/source_schema:/usr/src/app/source_schema:ro
      - ./data/source:/usr/src/app/data:ro
    networks:
      - etl_network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
          -P "$${MSSQL_SA_PASSWORD}" -C -b -d SmartCleanOrigen
          -Q "SET NOCOUNT ON; IF OBJECT_ID(N'dbo.ClienteOrigen', N'U') IS NULL RAISERROR('Tabla origen no creada',16,1); IF (SELECT COUNT_BIG(*) FROM dbo.ClienteOrigen) < 1000 RAISERROR('Datos origen incompletos',16,1); SELECT 1;"
          >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 60s

  postgres:
    build:
      context: ./postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "etl_user"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-Grupo1_PG!}"
      POSTGRES_DB: "etl_destino"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etl_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_destino"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  etl_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_DATABASE: "SmartCleanOrigen"
      SQLSERVER_USER: "sa"
      SQLSERVER_PASSWORD: "${MSSQL_SA_PASSWORD:-Grupo1@BDD!}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "etl_destino"
      POSTGRES_USER: "etl_user"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-Grupo1_PG!}"
      ETL_BATCH_SIZE: "500"
    networks:
      - etl_network
    restart: "no"

  webapp:
    build:
      context: ./webapp
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
      etl_pipeline:
        condition: service_completed_successfully
    environment:
      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_DATABASE: "SmartCleanOrigen"
      SQLSERVER_USER: "sa"
      SQLSERVER_PASSWORD: "${MSSQL_SA_PASSWORD:-Grupo1@BDD!}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "etl_destino"
      POSTGRES_USER: "etl_user"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-Grupo1_PG!}"
      WEBAPP_ROW_LIMIT: "100"
    networks:
      - etl_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  sqlserver_data:
  postgres_data:

networks:
  etl_network:
    driver: bridge
