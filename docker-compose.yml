services:
  sqlserver:
    build:
      context: .
      dockerfile: sqlserver/Dockerfile
    ports:
      - "1435:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Grupo1@BDD!}"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - etl_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    build:
      context: ./postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "etl_user"
      POSTGRES_PASSWORD: "Grupo1_PG!"
      POSTGRES_DB: "etl_destino"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etl_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_destino"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data:
  postgres_data:

networks:
  etl_network:
    driver: bridge
