<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline ETL - Demostración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sql-color: #ef4444; /* Rojo para SQL Server (sucio) */
            --pg-color: #10b981; /* Verde para Postgres (limpio) */
            --tab-active: #3b82f6;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color), #020617);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-align: center;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #fff;
            background: var(--tab-active);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .container {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1600px;
            justify-content: space-between;
        }

        .panel {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 50%;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .panel-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sql-title { color: var(--sql-color); }
        .pg-title { color: var(--pg-color); }

        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            margin-left: auto;
        }
        
        .sql-badge { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .pg-badge { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        th {
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 15px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            color: #cbd5e1;
            transition: background 0.2s ease;
        }

        tbody tr:last-child td { border-bottom: none; }
        
        tbody tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .highlight-error { color: #fca5a5; background: rgba(239, 68, 68, 0.1); }
        .highlight-ok { color: #6ee7b7; font-weight: 600; }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Ocultar tablas que no están activas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .status-bar { width: 100%; max-width: 1600px; margin: 0 0 18px; padding: 12px 16px; border-radius: 10px; display: none; }
        .status-bar.error { display: block; background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.35); color: #fecaca; }
        .summary-grid { width: 100%; max-width: 1600px; display: grid; grid-template-columns: repeat(4, minmax(150px,1fr)); gap: 12px; margin-bottom: 20px; }
        .summary-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; }
        .summary-card span { display:block; color: var(--text-muted); font-size:.78rem; }
        .summary-card strong { font-size:1.25rem; }
        .sample-note { color: var(--text-muted); font-size:.85rem; margin-top:12px; }

        @media (max-width: 1200px) {
            .container { flex-direction: column; }
            .panel { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>Validación del Pipeline ETL</h1>
    <p class="subtitle">Demostración en vivo de las bases de datos origen y destino</p>

    <!-- Navegación por Pestañas -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('clientes', this)">1. Clientes (Limpieza/Dedup)</button>
        <button class="tab-btn" onclick="switchTab('productos', this)">2. Productos</button>
        <button class="tab-btn" onclick="switchTab('facturas', this)">3. Facturas (Reasignación FK)</button>
        <button class="tab-btn" onclick="switchTab('detalles', this)">4. Detalles</button>
    </div>

    <div id="status-bar" class="status-bar"></div>
    <div id="summary-grid" class="summary-grid"></div>

    <div class="container">
        <!-- Panel de SQL Server -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="sql-title">SQL Server</h2>
                <span class="badge sql-badge">Origen (Datos Sucios)</span>
            </div>
            <div class="table-container">
                <table>
                    <thead id="sql-head"></thead>
                    <tbody id="sql-body">
                        <tr><td class="loading">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Panel de PostgreSQL -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="pg-title">PostgreSQL</h2>
                <span class="badge pg-badge">Destino (Datos Limpios)</span>
            </div>
            <div class="table-container">
                <table>
                    <thead id="pg-head"></thead>
                    <tbody id="pg-body">
                        <tr><td class="loading">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullData = null;
        let currentTab = 'clientes';

        const schemas = {
            clientes: {
                sqlCols: ['ID', 'Documento', 'Nombre', 'Apellido', 'Correo'],
                sqlKeys: ['idClienteOrigen', 'documento', 'nombre', 'apellido', 'correo'],
                pgCols: ['ID maestro', 'Documento', 'Nombre', 'Apellido', 'Correo'],
                pgKeys: ['id_cliente_origen', 'documento', 'nombre', 'apellido', 'correo']
            },
            productos: {
                sqlCols: ['ID', 'Código', 'Nombre', 'Precio', 'Estado'],
                sqlKeys: ['idProductoOrigen', 'codigoProducto', 'nombreProducto', 'precio', 'estado'],
                pgCols: ['ID maestro', 'Código', 'Nombre', 'Precio', 'Estado'],
                pgKeys: ['id_producto_origen', 'codigo_producto', 'nombre_producto', 'precio', 'estado']
            },
            facturas: {
                sqlCols: ['ID', 'Nº Factura', 'ID Cliente (origen)', 'Subtotal', 'Total'],
                sqlKeys: ['idFacturaOrigen', 'numeroFactura', 'idClienteOrigen', 'subtotal', 'total'],
                pgCols: ['ID Origen', 'Nº Factura', 'ID Cliente maestro', 'Subtotal', 'Total'],
                pgKeys: ['id_factura_origen', 'numero_factura', 'id_cliente_origen', 'subtotal', 'total']
            },
            detalles: {
                sqlCols: ['ID', 'ID Factura', 'ID Producto', 'Cantidad', 'Total Línea'],
                sqlKeys: ['idDetalleOrigen', 'idFacturaOrigen', 'idProductoOrigen', 'cantidad', 'totalLinea'],
                pgCols: ['ID Origen', 'ID Factura', 'ID Producto maestro', 'Cantidad', 'Total Línea'],
                pgKeys: ['id_detalle_origen', 'id_factura_origen', 'id_producto_origen', 'cantidad', 'total_linea']
            }
        };

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function formatNumber(value) {
            if (value === null || value === undefined) return '0';
            return Number(value).toLocaleString('es-EC', {maximumFractionDigits: 2});
        }

        async function init() {
            const status = document.getElementById('status-bar');
            try {
                const response = await fetch('/api/data', {cache: 'no-store'});
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                fullData = await response.json();
                const errores = [];
                if (!fullData.sqlserver.ok) errores.push(`SQL Server: ${fullData.sqlserver.error}`);
                if (!fullData.postgres.ok) errores.push(`PostgreSQL: ${fullData.postgres.error}`);
                if (errores.length) {
                    status.className = 'status-bar error';
                    status.textContent = errores.join(' | ');
                }
                renderSummary();
                renderTab();
            } catch (error) {
                status.className = 'status-bar error';
                status.textContent = `No se pudo cargar la API: ${error.message}`;
                renderError('No fue posible obtener los datos. Revisa docker compose logs webapp.');
            }
        }

        function switchTab(tabName, button) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderTab();
        }

        function renderSummary() {
            const sql = fullData.sqlserver.resumen || {};
            const pg = fullData.postgres.resumen || {};
            const cards = [
                ['Clientes', sql.clientes, pg.clientes],
                ['Productos', sql.productos, pg.productos],
                ['Facturas', sql.facturas, pg.facturas],
                ['Total facturado', sql.total_facturado, pg.total_facturado],
            ];
            document.getElementById('summary-grid').innerHTML = cards.map(([nombre, origen, destino]) => `
                <div class="summary-card"><span>${escapeHtml(nombre)}</span>
                <strong>${formatNumber(origen)} → ${formatNumber(destino)}</strong></div>`).join('');
        }

        function renderError(mensaje) {
            document.getElementById('sql-body').innerHTML = `<tr><td>${escapeHtml(mensaje)}</td></tr>`;
            document.getElementById('pg-body').innerHTML = `<tr><td>${escapeHtml(mensaje)}</td></tr>`;
        }

        function renderTab() {
            if (!fullData) return;
            const schema = schemas[currentTab];
            document.getElementById('sql-head').innerHTML = `<tr>${schema.sqlCols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
            document.getElementById('pg-head').innerHTML = `<tr>${schema.pgCols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
            renderRows('sql-body', fullData.sqlserver[currentTab] || [], schema.sqlKeys, true, schema.sqlCols.length);
            renderRows('pg-body', fullData.postgres[currentTab] || [], schema.pgKeys, false, schema.pgCols.length);
        }

        function renderRows(elementId, rows, keys, isSource, colSpan) {
            const body = document.getElementById(elementId);
            if (!rows.length) {
                body.innerHTML = `<tr><td colspan="${colSpan}" style="text-align:center">Sin datos</td></tr>`;
                return;
            }
            body.innerHTML = rows.map(row => {
                const cells = keys.map((key, index) => {
                    let value = row[key];
                    let cssClass = (!isSource && index === 0) ? 'highlight-ok' : '';
                    if (value === null || value === undefined || (typeof value === 'string' && !value.trim())) {
                        value = 'NULL';
                        if (isSource) cssClass = 'highlight-error';
                    }
                    if (isSource && key === 'correo' && value !== 'NULL' && !String(value).includes('@')) {
                        cssClass = 'highlight-error';
                    }
                    return `<td class="${cssClass}">${escapeHtml(value)}</td>`;
                }).join('');
                return `<tr>${cells}</tr>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
